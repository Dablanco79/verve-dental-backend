        supplierSku:
          type: string
          nullable: true
          maxLength: 100
        supplierDescription:
          type: string
          nullable: true
          maxLength: 500
        unitCostCents:
          type: integer
          minimum: 0
        unitOfMeasure:
          type: string
          nullable: true
          maxLength: 50
        active:
          type: boolean

    ImportRow:
      type: object
      required: [rowNumber, matchStatus]
      properties:
        rowNumber:
          type: integer
          description: 1-based row number in the source file (row 1 = header).
        supplierSku:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        rawUnitCost:
          type: string
          nullable: true
          description: Raw unit cost string as it appeared in the file.
        unitCostCents:
          type: integer
          nullable: true
          description: Parsed unit cost in integer cents. Null if parsing failed.
        unitOfMeasure:
          type: string
          nullable: true
        matchedProductId:
          type: string
          format: uuid
          nullable: true
        matchedProductName:
          type: string
          nullable: true
        matchedProductSku:
          type: string
          nullable: true
        matchStatus:
          type: string
          enum: [barcode, sku, name, manual, unmatched]
          description: >
            How the row was matched to a master catalog product.
            `barcode` = matched via barcode value;
            `sku` = matched via SKU;
            `name` = matched via exact name;
            `manual` = caller-supplied productId override;
            `unmatched` = no match found.
        error:
          type: string
          nullable: true
          description: Parse or import error message. Null on success.

    ImportPreviewResult:
      type: object
      required: [supplierId, totalRows, matchedRows, unmatchedRows, errorRows, rows]
      description: Phase-1 preview result — no writes performed.
      properties:
        supplierId:
          type: string
          format: uuid
        totalRows:
          type: integer
        matchedRows:
          type: integer
        unmatchedRows:
          type: integer
        errorRows:
          type: integer
        rows:
          type: array
          items:
            $ref: "#/components/schemas/ImportRow"

    ImportConfirmResult:
      type: object
      required: [supplierId, imported, updated, skipped, errors, rows]
      description: Phase-2 confirm result — catalogue entries created or updated.
      properties:
        supplierId:
          type: string
          format: uuid
        imported:
          type: integer
          description: New catalogue entries created.
        updated:
          type: integer
          description: Existing active entries updated.
        skipped:
          type: integer
          description: Rows skipped due to unmatched product.
        errors:
          type: integer
          description: Rows that failed with a parse or persistence error.
        rows:
          type: array
          items:
            $ref: "#/components/schemas/ImportRow"

# ── Paths ─────────────────────────────────────────────────────────────────────

paths:

  # ── System ──────────────────────────────────────────────────────────────────

  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [System]
      security: []
      responses:
        "200":
          description: Service is running.
          content:
            application/json:
              example:
                status: ok

  /api/v1/ready:
    get:
      summary: Readiness probe
      operationId: getReadiness
      tags: [System]
      security: []
      description: >
        Verifies database and Redis connectivity. Returns 200 only when both
        upstream dependencies are healthy. Suitable for Kubernetes readinessProbe.
      responses:
        "200":
          description: All dependencies reachable.
          content:
            application/json:
              example:
                status: ready
        "503":
          description: One or more dependencies unreachable.
          content:
            application/json:
              example:
                status: not_ready
                details:
                  db: ok
                  redis: unreachable

  # ── Auth ────────────────────────────────────────────────────────────────────

  /api/v1/auth/login:
    post:
      summary: Authenticate with email and password
      operationId: login
      tags: [Auth]
      security: []
      description: >
        Returns one of three outcomes depending on the user's MFA state:

        - `requiresMfa: false` — fully authenticated; `accessToken` and `refreshToken`
          cookie issued.
        - `requiresMfa: true` — MFA challenge; use `mfaToken` with POST /auth/mfa/verify.
        - `requiresMfaEnrollment: true` — privileged user must enroll MFA first; use
          `enrollmentToken` with POST /auth/mfa/setup and /auth/mfa/confirm.

        **Rate limited:** 10 requests per 15 minutes per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
            example:
              email: admin@verveclinic.com.au
              password: "securepassword"
      responses:
        "200":
          description: Authenticated, MFA required, or MFA enrollment required.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    oneOf:
                      - description: Direct authentication (no MFA).
                        type: object
                        required: [requiresMfa, accessToken, expiresIn, user]
                        properties:
                          requiresMfa:
                            type: boolean
                            enum: [false]
                          accessToken:
                            type: string
                          expiresIn:
                            type: integer
                          user:
                            $ref: "#/components/schemas/AuthenticatedUser"
                      - description: MFA challenge.
                        type: object
                        required: [requiresMfa, mfaToken, user]
                        properties:
                          requiresMfa:
                            type: boolean
                            enum: [true]
                          mfaToken:
                            type: string
                          user:
                            $ref: "#/components/schemas/AuthenticatedUser"
                      - description: MFA enrollment required (privileged user, first login).
                        type: object
                        required: [requiresMfaEnrollment, enrollmentToken, user]
                        properties:
                          requiresMfaEnrollment:
                            type: boolean
                            enum: [true]
                          enrollmentToken:
                            type: string
                          user:
                            $ref: "#/components/schemas/AuthenticatedUser"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: INVALID_CREDENTIALS
                  message: Invalid email or password
        "429":
          description: Auth rate limit exceeded.
          content:
            application/json:
              example:
                error: TOO_MANY_REQUESTS
                message: Too many attempts, please try again later.
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/mfa/verify:
    post:
      summary: Complete MFA challenge and receive tokens
      operationId: verifyMfa
      tags: [Auth]
      security: []
      description: >
        Completes the MFA challenge initiated by POST /auth/login. On success,
        issues access token and sets the `refreshToken` HttpOnly cookie.

        **Rate limited:** 10 requests per 15 minutes per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfaToken, code]
              properties:
                mfaToken:
                  type: string
                  description: Short-lived token returned by POST /auth/login when requiresMfa = true.
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  description: 6-digit TOTP code from the authenticator app.
      responses:
        "200":
          description: MFA verified. Access token issued; refreshToken cookie set.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          description: Invalid or expired MFA token or incorrect TOTP code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/mfa/setup:
    post:
      summary: Initiate MFA enrollment (privileged users only)
      operationId: setupMfa
      tags: [Auth]
      security:
        - bearerAuth: []
      description: >
        Generates a TOTP secret for the authenticated user. The Bearer token
        must be an `mfa_enrollment` token (received from POST /auth/login when
        `requiresMfaEnrollment = true`).

        Returns a TOTP URI and Base32 secret for the authenticator app.

        **Rate limited:** 10 requests per 15 minutes per IP.
      responses:
        "200":
          description: TOTP secret and QR URI returned.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    description: TOTP setup details (otpUri, secret).
                    additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/mfa/confirm:
    post:
      summary: Confirm MFA enrollment with a TOTP code
      operationId: confirmMfa
      tags: [Auth]
      security:
        - bearerAuth: []
      description: >
        Activates MFA for the user by verifying a 6-digit TOTP code against the
        newly generated secret. The Bearer token must be an `mfa_enrollment` token.

        **Rate limited:** 10 requests per 15 minutes per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  description: 6-digit TOTP code from the authenticator app.
      responses:
        "200":
          description: MFA enrollment confirmed.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: MFA enrollment complete
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/refresh:
    post:
      summary: Rotate access token using the refresh cookie
      operationId: refreshToken
      tags: [Auth]
      security: []
      description: >
        Reads the `refreshToken` HttpOnly cookie set by POST /auth/login or
        /auth/mfa/verify. Issues a new access token and rotates the refresh cookie.

        No Authorization header is required. The refresh token is transmitted
        automatically by the browser as a same-site cookie.

        **Rate limited:** 10 requests per 15 minutes per IP.
      responses:
        "200":
          description: New access token issued. Refresh cookie rotated.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Refresh token cookie is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: MISSING_REFRESH_TOKEN
                  message: Refresh token required
        "401":
          description: Refresh token is expired, revoked, or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/logout:
    post:
      summary: Revoke refresh token and clear cookie
      operationId: logout
      tags: [Auth]
      security: []
      description: >
        Revokes the `refreshToken` cookie and clears it. No Authorization header
        is required. A missing or already-revoked cookie is silently ignored.
      responses:
        "204":
          $ref: "#/components/responses/NoContent"

  /api/v1/auth/me:
    get:
      summary: Return the current authenticated user
      operationId: getCurrentUser
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/AuthenticatedUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/change-password:
    post:
      summary: Change the authenticated user's password
      operationId: changePassword
      tags: [Auth]
      security:
        - bearerAuth: []
      description: >
        Changes the password for the currently authenticated user. On success,
        the user should log in again with the new password as existing sessions
        are not automatically invalidated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  minLength: 1
                newPassword:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password changed successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Password changed successfully. Please log in again.
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Admin ────────────────────────────────────────────────────────────────────

  /api/v1/admin/ping:
    get:
      summary: Admin access probe
      operationId: adminPing
      tags: [Admin]
      security:
        - bearerAuth: []
      description: >
        Returns 200 only for `owner_admin` role. Used to verify admin access
        is working correctly. Not a health check — it verifies RBAC enforcement.
      responses:
        "200":
          description: Admin access confirmed.
          content:
            application/json:
              example:
                data:
                  message: Admin access granted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ── Clinics ──────────────────────────────────────────────────────────────────

  /api/v1/clinics/{clinicId}/summary:
    get:
      summary: Tenant-scoped clinic summary (isolation verification)
      operationId: getClinicSummary
      tags: [Clinics]
      security:
        - bearerAuth: []
      description: >
        Returns a lightweight summary confirming that the authenticated user has
        tenant-scoped access to the clinic. Primarily used for integration testing
        of RLS and tenant isolation.
      parameters:
        - $ref: "#/components/parameters/clinicId"
      responses:
        "200":
          description: Clinic summary with tenant access confirmation.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    properties:
                      clinicId:
                        type: string
                        format: uuid
                      homeClinicName:
                        type: string
                      accessedBy:
                        type: string
                      message:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}:
    get:
      summary: Get clinic details
      operationId: getClinic
      tags: [Clinics]
      security:
        - bearerAuth: []
      description: >
        Returns the full clinic record. `owner_admin` may fetch any clinic;
        all other roles are restricted to their home clinic.
      parameters:
        - $ref: "#/components/parameters/clinicId"
      responses:
        "200":
          description: Clinic record.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Clinic"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: Update clinic settings
      operationId: updateClinic
      tags: [Clinics]
      security:
        - bearerAuth: []
      description: >
        Partial update — only supplied fields are written. Restricted to
        `owner_admin`. `subscriptionTier` is rejected at the schema boundary;
        tier changes require a billing workflow.
      parameters:
        - $ref: "#/components/parameters/clinicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClinicRequest"
      responses:
        "200":
          description: Updated clinic record.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Clinic"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Inventory ────────────────────────────────────────────────────────────────

  /api/v1/clinics/{clinicId}/inventory:
    get:
      summary: List clinic inventory items
      operationId: listClinicInventory
      tags: [Inventory]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: Paginated list of inventory items.
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/InventoryItem"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/inventory/adjustments:
    get:
      summary: List inventory adjustment history
      operationId: listInventoryAdjustments
      tags: [Inventory]
      security:
        - bearerAuth: []
      description: Returns the audit trail of all stock adjustments (scans, manual adjustments, receives) for the clinic.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: Paginated list of inventory adjustments.
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/InventoryAdjustment"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/inventory/adjust:
    post:
      summary: Manually adjust clinic inventory stock level
      operationId: adjustClinicInventory
      tags: [Inventory]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/clinicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryAdjustRequest"
      responses:
        "200":
          description: Updated inventory item and adjustment record.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/InventoryAdjustResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clinics/{clinicId}/inventory/{itemId}:
    get:
      summary: Get a single inventory item
      operationId: getInventoryItem
      tags: [Inventory]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/itemId"
      responses:
        "200":
          description: Inventory item detail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/InventoryItem"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Scanning ─────────────────────────────────────────────────────────────────

  /api/v1/clinics/{clinicId}/scans:
    post:
      summary: Process a barcode scan to deduct or receive stock
      operationId: handleScan
      tags: [Scanning]
      security:
        - bearerAuth: []
      description: >
        Parses a barcode, resolves the master catalog item, and deducts (default)
        or receives stock. Automatically appends a draft PO line if the post-scan
        quantity falls below the reorder point.
      parameters:
        - $ref: "#/components/parameters/clinicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "200":
          description: Scan processed successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ScanResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Barcode not found in master catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Products ─────────────────────────────────────────────────────────────────

  /api/v1/clinics/{clinicId}/products:
    post:
      summary: Add a new product to the master catalog and clinic inventory
      operationId: createClinicProduct
      tags: [Products]
      security:
        - bearerAuth: []
      description: >
        Creates a master catalog item, registers the barcode mapping, and creates
        the corresponding clinic inventory item with initial quantity. Restricted
        to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created in master catalog and clinic inventory.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/CreateProductResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Users ────────────────────────────────────────────────────────────────────

  /api/v1/clinics/{clinicId}/users:
    get:
      summary: List clinic users
      operationId: listClinicUsers
      tags: [Users]
      security:
        - bearerAuth: []
      description: >
        Returns all users belonging to the clinic. Restricted to `owner_admin`
        and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
      responses:
        "200":
          description: List of clinic users.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      summary: Create a new clinic user
      operationId: createClinicUser
      tags: [Users]
      security:
        - bearerAuth: []
      description: >
        Creates a new user account assigned to the clinic. Restricted to
        `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/clinics/{clinicId}/users/{userId}/reset-password:
    post:
      summary: Reset a user's password
      operationId: resetUserPassword
      tags: [Users]
      security:
        - bearerAuth: []
      description: >
        Resets the password for a specific user. Restricted to `owner_admin`
        and `group_practice_manager`. The affected user's existing sessions are
        not automatically invalidated.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/userId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        "200":
          description: Password reset successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Password reset successfully.
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Purchase Orders ──────────────────────────────────────────────────────────

  /api/v1/clinics/{clinicId}/purchase-orders:
    get:
      summary: List draft purchase orders
      operationId: listPurchaseOrders
      tags: [Purchase Orders]
      security:
        - bearerAuth: []
      description: >
        Returns draft purchase orders for the clinic. Draft POs are automatically
        created when a scan causes stock to fall below the reorder point.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: List of draft purchase orders.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PurchaseOrder"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/purchase-orders/export.csv:
    get:
      summary: Export purchase orders as CSV
      operationId: exportPurchaseOrdersCsv
      tags: [Purchase Orders]
      security:
        - bearerAuth: []
      description: Returns draft purchase order lines as a downloadable CSV file.
      parameters:
        - $ref: "#/components/parameters/clinicId"
      responses:
        "200":
          description: CSV file download.
          content:
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/purchase-orders/{poId}/submit:
    patch:
      summary: Submit a draft purchase order
      operationId: submitPurchaseOrder
      tags: [Purchase Orders]
      security:
        - bearerAuth: []
      description: >
        Advances the purchase order status from `draft` to `submitted`.
        Restricted to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/poId"
      responses:
        "200":
          description: Purchase order submitted.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/PurchaseOrder"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Purchase order is not in draft status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Roster ───────────────────────────────────────────────────────────────────

  /api/v1/clinics/{clinicId}/roster:
    get:
      summary: List roster entries
      operationId: listRosterEntries
      tags: [Roster]
      security:
        - bearerAuth: []
      description: >
        Returns paginated roster entries for the clinic. Accessible to
        `owner_admin`, `group_practice_manager`, and `clinical_staff`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Filter shifts starting at or after this datetime (ISO 8601 with offset).
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Filter shifts starting before this datetime. Must be after `from`.
        - name: status
          in: query
          schema:
            type: string
            enum: [scheduled, confirmed, completed, cancelled]
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: Paginated list of roster entries.
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RosterEntry"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      summary: Create a roster entry
      operationId: createRosterEntry
      tags: [Roster]
      security:
        - bearerAuth: []
      description: >
        Schedules a shift for a staff member. Restricted to `owner_admin` and
        `group_practice_manager`. Shift time ordering (end > start) is validated
        at the service layer (returns `INVALID_SHIFT_TIMES` if violated).
      parameters:
        - $ref: "#/components/parameters/clinicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRosterEntryRequest"
      responses:
        "201":
          description: Roster entry created.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RosterEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/roster/me:
    get:
      summary: List the authenticated user's own shifts
      operationId: getMyShifts
      tags: [Roster]
      security:
        - bearerAuth: []
      description: >
        Returns shifts for the currently authenticated user. Accessible to all
        roles. Supports the same `from` / `to` filters as the full roster list.
        Does NOT return a pagination envelope — returns the array directly.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: List of the authenticated user's roster entries.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RosterEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/roster/{entryId}:
    get:
      summary: Get a single roster entry
      operationId: getRosterEntry
      tags: [Roster]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/entryId"
      responses:
        "200":
          description: Roster entry detail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RosterEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: Update a roster entry
      operationId: updateRosterEntry
      tags: [Roster]
      security:
        - bearerAuth: []
      description: >
        Partial update — only supplied fields are written. Restricted to
        `owner_admin` and `group_practice_manager`. Unknown keys produce 400
        VALIDATION_ERROR (strict mode). An empty body produces 400 NO_VALID_FIELDS.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/entryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRosterEntryRequest"
      responses:
        "200":
          description: Updated roster entry.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RosterEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Cancel a roster entry
      operationId: cancelRosterEntry
      tags: [Roster]
      security:
        - bearerAuth: []
      description: >
        Sets the roster entry status to `cancelled`. Does not hard-delete the
        record. Restricted to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/entryId"
      responses:
        "200":
          description: Cancelled roster entry.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RosterEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Forecast ─────────────────────────────────────────────────────────────────

  /api/v1/clinics/{clinicId}/forecast/materials:
    get:
      summary: Get SKU-level materials demand forecast
      operationId: getMaterialsForecast
      tags: [Forecast]
      security:
        - bearerAuth: []
      description: >
        Returns the full SKU demand projection table for the clinic. Forecast
        and lookback windows are anchored to clinic-local calendar-day boundaries
        (timezone fetched from the clinic record). Accessible to all roles.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - name: forecastDays
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 14
          description: Forward-looking forecast window in calendar days.
        - name: lookbackDays
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
          description: Historical sampling window in calendar days.
      responses:
        "200":
          description: Material forecast rows (all SKUs).
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MaterialForecastRow"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Clinic not found (cannot resolve timezone).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: CLINIC_NOT_FOUND
                  message: The requested clinic resource does not exist.

  /api/v1/clinics/{clinicId}/forecast/alerts:
    get:
      summary: Get actionable materials shortage alerts
      operationId: getMaterialsAlerts
      tags: [Forecast]
      security:
        - bearerAuth: []
      description: >
        Returns only SKUs where projected stock remaining falls below the reorder
        point during the forecast window. Sorted: critical shortfalls first, then
        by shortfall units descending. Accepts the same query parameters as
        /forecast/materials.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - name: forecastDays
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 14
        - name: lookbackDays
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
      responses:
        "200":
          description: Shortage alert rows (filtered to isShortfall = true, sorted by severity).
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MaterialForecastRow"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clinics/{clinicId}/forecast/labor:
    get:
      summary: Get labor cost projection
      operationId: getLaborForecast
      tags: [Forecast]
      security:
        - bearerAuth: []
      description: >
        Returns the labor cost projection summary for the clinic including per-role
        breakdowns, base costs, overhead costs, and grand totals.

        **Cost values are fractional AUD dollars** (NOT cents) — division by 100
        is applied in the route handler. E.g. 45000 cents → 450.00 dollars.

        Restricted to `owner_admin` and `group_practice_manager` (financial data).
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - name: forecastDays
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 14
          description: Forward-looking forecast window in calendar days.
      responses:
        "200":
          description: Labor cost forecast summary.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/LaborForecastSummary"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Timesheets ───────────────────────────────────────────────────────────────

  /api/v1/clinics/{clinicId}/timesheets/clock-in:
    post:
      summary: Clock in to start a shift
      operationId: clockIn
      tags: [Timesheets]
      security:
        - bearerAuth: []
      description: >
        Creates an `hourly_auto` timesheet entry in `draft` status. Intended for
        `clinical_staff`. The service rejects clock-ins from `owner_admin` and
        `group_practice_manager` with FORBIDDEN — managers use POST /timesheets
        (manual entry) instead.
      parameters:
        - $ref: "#/components/parameters/clinicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockInRequest"
      responses:
        "201":
          description: Timesheet entry created (draft status).
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/TimesheetEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: An open timesheet entry already exists for this staff member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/clinics/{clinicId}/timesheets/forecast:
    get:
      summary: Get commission attendance logs for the forecasting engine
      operationId: getTimesheetForecastLogs
      tags: [Timesheets]
      security:
        - bearerAuth: []
      description: >
        Returns verified `commission_log` timesheet entries for a specific date,
        used by the materials forecasting engine to determine actual provider
        attendance. Only `present`, `absent`, and `sick` statuses are returned;
        `pending_verification` and `cancelled` are excluded.

        Restricted to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Shift date (YYYY-MM-DD).
      responses:
        "200":
          description: Commission log entries for the date.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimesheetEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/timesheets:
    get:
      summary: List clinic timesheet entries
      operationId: listTimesheets
      tags: [Timesheets]
      security:
        - bearerAuth: []
      description: >
        Returns paginated timesheet entries for the clinic. Supports rich filtering
        by date range, payroll type, attendance status, timesheet status, and a
        `pendingApprovalOnly` shortcut for the approval queue.

        Restricted to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - name: shiftDate
          in: query
          schema:
            type: string
            format: date
          description: Filter to a single date. Cannot be combined with `from`/`to`.
        - $ref: "#/components/parameters/fromDateParam"
        - $ref: "#/components/parameters/toDateParam"
        - name: payrollType
          in: query
          schema:
            type: string
            enum: [hourly_auto, hourly_manual, commission_log]
        - name: attendanceStatus
          in: query
          schema:
            type: string
            enum: [pending_verification, present, absent, sick, cancelled]
        - name: timesheetStatus
          in: query
          schema:
            type: string
            enum: [draft, submitted, approved, rejected, requires_amendment, processed]
        - name: pendingApprovalOnly
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: When "true", returns only entries where timesheetStatus = "submitted".
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: Paginated list of timesheet entries.
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimesheetEntry"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      summary: Create a manual timesheet entry
      operationId: createManualTimesheetEntry
      tags: [Timesheets]
      security:
        - bearerAuth: []
      description: >
        Creates an `hourly_manual` entry for a staff member — used for missed
        clock-ins, retrospective back-fills, or corrections. The entry is
        immediately set to `submitted` status for manager approval.

        Restricted to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateManualTimesheetRequest"
      responses:
        "201":
          description: Manual timesheet entry created (submitted status).
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/TimesheetEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/timesheets/{timesheetId}/clock-out:
    post:
      summary: Clock out of an open shift
      operationId: clockOut
      tags: [Timesheets]
      security:
        - bearerAuth: []
      description: >
        Closes an open timesheet entry, calculates hour buckets (ordinary,
        overtime 1.5×, overtime 2×), and advances status to `submitted`.
        The service enforces that the caller owns the entry.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/timesheetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockOutRequest"
      responses:
        "200":
          description: Timesheet entry updated (submitted status).
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/TimesheetEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clinics/{clinicId}/timesheets/{timesheetId}/approve:
    post:
      summary: Approve a submitted timesheet entry
      operationId: approveTimesheet
      tags: [Timesheets]
      security:
        - bearerAuth: []
      description: >
        Approves a `submitted` timesheet. Hour buckets are recalculated from
        stored clock times at approval time (authoritative values). Restricted
        to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/timesheetId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                approvalNotes:
                  type: string
                  maxLength: 2000
                  nullable: true
      responses:
        "200":
          description: Timesheet approved.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/TimesheetEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Timesheet is not in submitted status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/clinics/{clinicId}/timesheets/{timesheetId}/reject:
    post:
      summary: Reject a submitted timesheet entry
      operationId: rejectTimesheet
      tags: [Timesheets]
      security:
        - bearerAuth: []
      description: >
        Rejects a `submitted` timesheet. `approvalNotes` is mandatory so staff
        understand the reason for rejection. Restricted to `owner_admin` and
        `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/timesheetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approvalNotes]
              properties:
                approvalNotes:
                  type: string
                  minLength: 1
                  maxLength: 2000
                  description: Mandatory rejection reason for the staff member.
      responses:
        "200":
          description: Timesheet rejected.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/TimesheetEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clinics/{clinicId}/timesheets/{timesheetId}/verify-attendance:
    post:
      summary: Verify provider attendance on a commission log entry
      operationId: verifyCommissionAttendance
      tags: [Timesheets]
      security:
        - bearerAuth: []
      description: >
        Sets the `attendanceStatus` on a `commission_log` timesheet entry. This
        directly controls the materials forecasting engine:

        - `present` → full expected material usage counted.
        - `absent` / `sick` → zero material usage.
        - `cancelled` → shift removed from forecast entirely.

        `pending_verification` cannot be set by managers — it is the system default.
        Restricted to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/timesheetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [attendanceStatus]
              properties:
                attendanceStatus:
                  type: string
                  enum: [present, absent, sick, cancelled]
                  description: Decisive status only. pending_verification is excluded.
                commissionNote:
                  type: string
                  maxLength: 2000
                  nullable: true
      responses:
        "200":
          description: Attendance verified.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/TimesheetEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Leave ────────────────────────────────────────────────────────────────────

  /api/v1/clinics/{clinicId}/leave/me:
    get:
      summary: List the authenticated user's own leave requests
      operationId: listMyLeave
      tags: [Leave]
      security:
        - bearerAuth: []
      description: >
        Returns leave requests for the currently authenticated user. Accessible
        to all roles. Supports the same filters as GET /leave. Does NOT return
        a pagination envelope — returns the array directly.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/fromDateParam"
        - $ref: "#/components/parameters/toDateParam"
        - name: leaveType
          in: query
          schema:
            type: string
            enum: [annual, sick, personal, compassionate, unpaid, other]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, withdrawn]
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: List of the authenticated user's leave requests.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaveRequest"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/leave:
    get:
      summary: List all clinic leave requests (manager view)
      operationId: listClinicLeave
      tags: [Leave]
      security:
        - bearerAuth: []
      description: >
        Returns paginated leave requests for all staff in the clinic. Restricted
        to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/fromDateParam"
        - $ref: "#/components/parameters/toDateParam"
        - name: leaveType
          in: query
          schema:
            type: string
            enum: [annual, sick, personal, compassionate, unpaid, other]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, withdrawn]
        - $ref: "#/components/parameters/limitParam"
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: Paginated list of clinic leave requests.
          content:
            application/json:
              schema:
                type: object
                required: [data, pagination]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaveRequest"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      summary: Submit a leave request
      operationId: createLeaveRequest
      tags: [Leave]
      security:
        - bearerAuth: []
      description: >
        Submits a new leave request for the authenticated user. Accessible to
        all roles. Managers may also submit on behalf of staff (e.g. retrospective
        sick leave). The service enforces clinic-match for `clinical_staff`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeaveRequestBody"
      responses:
        "201":
          description: Leave request created (pending status).
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/LeaveRequest"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/leave/{leaveId}/approve:
    post:
      summary: Approve a leave request
      operationId: approveLeaveRequest
      tags: [Leave]
      security:
        - bearerAuth: []
      description: >
        Approves a pending leave request. Automatically cancels any overlapping
        scheduled/confirmed roster shifts for the staff member (roster guardrail).
        Restricted to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/leaveId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reviewNotes:
                  type: string
                  maxLength: 2000
                  nullable: true
      responses:
        "200":
          description: Leave request approved.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/LeaveRequest"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Leave request is not in pending status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/clinics/{clinicId}/leave/{leaveId}/reject:
    post:
      summary: Reject a leave request
      operationId: rejectLeaveRequest
      tags: [Leave]
      security:
        - bearerAuth: []
      description: >
        Rejects a pending leave request. `reviewNotes` is mandatory so staff
        understand the reason. Restricted to `owner_admin` and
        `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/leaveId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewNotes]
              properties:
                reviewNotes:
                  type: string
                  minLength: 1
                  maxLength: 2000
                  description: Mandatory rejection reason.
      responses:
        "200":
          description: Leave request rejected.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/LeaveRequest"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clinics/{clinicId}/leave/{leaveId}/withdraw:
    post:
      summary: Withdraw a leave request
      operationId: withdrawLeaveRequest
      tags: [Leave]
      security:
        - bearerAuth: []
      description: >
        Staff member withdraws their own pending leave request. No request body
        required. The service enforces ownership — the caller must be the request
        owner or `owner_admin`. Accessible to all roles.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/leaveId"
      responses:
        "200":
          description: Leave request withdrawn.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/LeaveRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Leave request is not in a withdrawable state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Billing ───────────────────────────────────────────────────────────────────

  /api/v1/clinics/{clinicId}/billing/invoices:
    get:
      summary: List invoices
      operationId: listInvoices
      tags: [Billing]
      security:
        - bearerAuth: []
      description: >
        Returns invoices for the clinic. Read access for all authenticated roles.
        Supports filtering by status, date range, and patient ID.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, issued, partially_paid, paid, overdue, void, cancelled]
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: Filter invoices created on or after this date (YYYY-MM-DD).
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: Filter invoices created on or before this date (YYYY-MM-DD).
        - name: patientId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - $ref: "#/components/parameters/offsetParam"
      responses:
        "200":
          description: List of invoices.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invoice"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      summary: Create a draft invoice
      operationId: createInvoice
      tags: [Billing]
      security:
        - bearerAuth: []
      description: >
        Creates a new invoice in `draft` status. Line items can be added while
        in draft. Restricted to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: Draft invoice created.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Invoice"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/billing/invoices/{invoiceId}:
    get:
      summary: Get invoice detail
      operationId: getInvoice
      tags: [Billing]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/invoiceId"
      responses:
        "200":
          description: Invoice detail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Invoice"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clinics/{clinicId}/billing/invoices/{invoiceId}/issue:
    patch:
      summary: Issue a draft invoice
      operationId: issueInvoice
      tags: [Billing]
      security:
        - bearerAuth: []
      description: >
        Transitions the invoice from `draft` to `issued`. Assigns a sequential
        invoice number (e.g. INV-2026-000001). No further line item changes are
        permitted after issuing. Restricted to `owner_admin` and
        `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/invoiceId"
      responses:
        "200":
          description: Invoice issued.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Invoice"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invoice is not in draft status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/clinics/{clinicId}/billing/invoices/{invoiceId}/void:
    patch:
      summary: Void an invoice
      operationId: voidInvoice
      tags: [Billing]
      security:
        - bearerAuth: []
      description: >
        Voids the invoice with a mandatory reason. Terminal state — cannot be
        undone. Restricted to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/invoiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 1
                  maxLength: 1000
      responses:
        "200":
          description: Invoice voided.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Invoice"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invoice is already voided or cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/clinics/{clinicId}/billing/invoices/{invoiceId}/line-items:
    get:
      summary: List invoice line items
      operationId: listInvoiceLineItems
      tags: [Billing]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/invoiceId"
      responses:
        "200":
          description: List of line items for the invoice.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/InvoiceLineItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      summary: Add a line item to an invoice
      operationId: addInvoiceLineItem
      tags: [Billing]
      security:
        - bearerAuth: []
      description: >
        Adds a line item to a `draft` invoice and recalculates the invoice totals.
        Returns both the created line item and the updated invoice. Restricted to
        `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/invoiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddLineItemRequest"
      responses:
        "201":
          description: Line item added. Invoice totals recalculated.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [lineItem, invoice]
                    properties:
                      lineItem:
                        $ref: "#/components/schemas/InvoiceLineItem"
                      invoice:
                        $ref: "#/components/schemas/Invoice"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invoice is not in draft status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/clinics/{clinicId}/billing/invoices/{invoiceId}/line-items/{lineItemId}:
    delete:
      summary: Remove a line item from an invoice
      operationId: removeInvoiceLineItem
      tags: [Billing]
      security:
        - bearerAuth: []
      description: >
        Removes a line item from a `draft` invoice and recalculates invoice totals.
        Returns the updated invoice. Restricted to `owner_admin` and
        `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/invoiceId"
        - $ref: "#/components/parameters/lineItemId"
      responses:
        "200":
          description: Line item removed. Invoice totals recalculated.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [invoice]
                    properties:
                      invoice:
                        $ref: "#/components/schemas/Invoice"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invoice is not in draft status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/clinics/{clinicId}/billing/invoices/{invoiceId}/payments:
    get:
      summary: List payments for an invoice
      operationId: listInvoicePayments
      tags: [Billing]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/invoiceId"
      responses:
        "200":
          description: List of payment records.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PaymentRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      summary: Record a payment against an invoice
      operationId: recordInvoicePayment
      tags: [Billing]
      security:
        - bearerAuth: []
      description: >
        Records a payment (or refund) against an issued invoice. Updates invoice
        totals and status. Returns both the created payment record and the updated
        invoice. Restricted to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/invoiceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPaymentRequest"
      responses:
        "201":
          description: Payment recorded. Invoice status updated.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [payment, invoice]
                    properties:
                      payment:
                        $ref: "#/components/schemas/PaymentRecord"
                      invoice:
                        $ref: "#/components/schemas/Invoice"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invoice is void or cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Analytics ─────────────────────────────────────────────────────────────────

  /api/v1/clinics/{clinicId}/analytics/dashboard:
