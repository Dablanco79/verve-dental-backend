          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
          description: Lookback period in days.
      responses:
        "200":
          description: Dashboard KPI summary.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/DashboardKpis"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/analytics/revenue:
    get:
      summary: Monthly revenue breakdown
      operationId: getRevenueReport
      tags: [Analytics]
      security:
        - bearerAuth: []
      description: >
        Returns a monthly revenue breakdown with per-month rows. Restricted to
