          description: Number of calendar months to include (most recent N months).
      responses:
        "200":
          description: Revenue report.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RevenueReport"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/analytics/inventory:
    get:
      summary: Inventory consumption report
      operationId: getInventoryReport
      tags: [Analytics]
      security:
        - bearerAuth: []
      description: >
        Returns per-SKU inventory consumption data for the specified period.
        Restricted to `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - name: periodDays
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
          description: Lookback period in days.
      responses:
        "200":
          description: Inventory consumption report.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/InventoryReport"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/analytics/staff:
    get:
      summary: Staff attendance summary
      operationId: getStaffReport
      tags: [Analytics]
      security:
        - bearerAuth: []
      description: >
        Returns per-staff attendance and shift completion metrics. Restricted to
        `owner_admin` and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - name: periodDays
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
          description: Lookback period in days.
      responses:
        "200":
          description: Staff attendance report.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/StaffReport"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/analytics/audit-events:
    get:
      summary: Paginated audit event trail
      operationId: listAuditEvents
      tags: [Analytics]
      security:
        - bearerAuth: []
      description: >
        Returns a paginated audit trail of all significant events in the clinic.
        Supports filtering by entity type, actor, entity ID, and datetime range.
        Restricted to `owner_admin` and `group_practice_manager`.

        **Defaults:** `limit = 50`, `offset = 0`.
        **Maximum:** `limit = 200`, `offset = 100000`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100000
            default: 0
        - name: entityType
          in: query
          schema:
            type: string
            enum:
              - auth
              - invoice
              - payment
              - line_item
              - inventory_adjustment
              - roster_entry
              - timesheet_entry
              - leave_request
              - purchase_order
              - user
              - clinic
              - product
              - scan
        - name: actorId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter events performed by a specific user.
        - name: entityId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter events related to a specific entity.
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Filter events at or after this datetime (ISO 8601 with offset).
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Filter events at or before this datetime.
      responses:
        "200":
          description: Paginated audit event trail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/AuditEventsPage"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/clinics/{clinicId}/analytics/audit-events/{eventId}:
    get:
      summary: Get a single audit event
      operationId: getAuditEvent
      tags: [Analytics]
      security:
        - bearerAuth: []
      description: >
        Returns full detail for a single audit event. Restricted to `owner_admin`
        and `group_practice_manager`.
      parameters:
        - $ref: "#/components/parameters/clinicId"
        - $ref: "#/components/parameters/eventId"
      responses:
        "200":
          description: Audit event detail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/AuditEvent"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Sprint O: Supplier Management ─────────────────────────────────────────

  /suppliers:
    get:
      operationId: listSuppliers
      tags: [Suppliers]
      summary: List all suppliers
      security:
        - bearerAuth: []
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
          description: Filter by active status. Omit to return all.
      responses:
        "200":
          description: Array of suppliers.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Supplier"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createSupplier
      tags: [Suppliers]
      summary: Create a supplier
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "201":
          description: Supplier created.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Supplier"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /suppliers/{supplierId}:
    get:
      operationId: getSupplier
      tags: [Suppliers]
      summary: Get a supplier by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/supplierId"
      responses:
        "200":
          description: Supplier detail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Supplier"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateSupplier
      tags: [Suppliers]
      summary: Update a supplier
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/supplierId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupplierBody"
      responses:
        "200":
          description: Updated supplier.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Supplier"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Supplier Catalogue Pricing ───────────────────────────────────────────────

  /suppliers/{supplierId}/catalogue:
    get:
      operationId: listSupplierCatalogue
      tags: [Supplier Catalogue]
      summary: List pricing entries for a supplier
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/supplierId"
        - name: active
          in: query
          schema:
            type: boolean
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Array of supplier pricing entries.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SupplierProduct"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createSupplierProduct
      tags: [Supplier Catalogue]
      summary: Add a pricing entry for a product
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/supplierId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierProductBody"
      responses:
        "201":
          description: Pricing entry created.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/SupplierProduct"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /suppliers/{supplierId}/catalogue/{supplierProductId}:
    get:
      operationId: getSupplierProduct
      tags: [Supplier Catalogue]
      summary: Get a single pricing entry
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/supplierId"
        - $ref: "#/components/parameters/supplierProductId"
      responses:
        "200":
          description: Pricing entry detail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/SupplierProduct"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateSupplierProduct
      tags: [Supplier Catalogue]
      summary: Update a pricing entry
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/supplierId"
        - $ref: "#/components/parameters/supplierProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupplierProductBody"
      responses:
        "200":
          description: Updated pricing entry.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/SupplierProduct"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Cross-supplier pricing lookup ────────────────────────────────────────────

  /suppliers/products/{productId}/pricing:
    get:
      operationId: listProductPricing
      tags: [Supplier Catalogue]
      summary: List all supplier prices for a master catalog product
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Master catalog item ID.
      responses:
        "200":
          description: Array of active pricing entries across all suppliers.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SupplierProduct"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Catalogue Import ──────────────────────────────────────────────────────────

  /suppliers/{supplierId}/catalogue/import/preview:
    post:
      operationId: importCataloguePreview
      tags: [Supplier Catalogue]
      summary: Parse and preview a catalogue file (dry-run)
      description: >
        Phase 1 of the two-phase catalogue import workflow.
        Parses the uploaded CSV or Excel file and runs product matching for each row.
        Returns a preview with match status — no database writes are performed.

        **Required columns (case-insensitive):** `description` (or `name`), `unit_cost`

        **Optional columns:** `supplier_sku`, `unit_of_measure`, `barcode`

        **unit_cost** is interpreted as decimal dollars (e.g. `12.50` = $12.50 = 1250 cents).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/supplierId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV (.csv) or Excel (.xlsx) file. Max 5 MB.
      responses:
        "200":
          description: Import preview with per-row match status.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ImportPreviewResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /suppliers/{supplierId}/catalogue/import/confirm:
    post:
      operationId: importCatalogueConfirm
      tags: [Supplier Catalogue]
      summary: Confirm and persist a catalogue import
      description: >
        Phase 2 of the two-phase catalogue import workflow.
        Parses the file again and upserts supplier catalogue entries for all
        successfully matched rows.

        Unmatched rows are skipped unless a `manualMappings` JSON object is
        provided mapping `rowNumber` → `productId` (UUID).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/supplierId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Same file as submitted to preview.
                manualMappings:
                  type: string
                  description: >
                    JSON-encoded object mapping row numbers to productIds for
                    rows that could not be automatically matched.
                    Example: `{"5":"uuid-product-1","12":"uuid-product-2"}`
      responses:
        "200":
          description: Import result with counts and per-row outcome.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/ImportConfirmResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

# ── Tags ──────────────────────────────────────────────────────────────────────

tags:
  - name: System
    description: Health and readiness probes.
  - name: Auth
    description: Authentication, MFA enrollment, token management.
  - name: Admin
    description: Administrative access probes (owner_admin only).
  - name: Clinics
    description: Clinic record management.
  - name: Inventory
    description: Clinic inventory items, stock levels, and adjustment history.
  - name: Scanning
    description: Barcode scan processing — deduct or receive stock.
  - name: Products
    description: Master catalog product creation and barcode registration.
  - name: Users
    description: Clinic user management.
  - name: Purchase Orders
    description: Draft purchase orders generated from low-stock scan events.
  - name: Roster
    description: Shift scheduling and roster management.
  - name: Forecast
    description: Materials demand forecasting and labor cost projection.
  - name: Timesheets
    description: Clock-in/out, timesheet approval workflow, and commission attendance.
  - name: Leave
    description: Leave request submission, approval, and withdrawal.
  - name: Billing
    description: Invoicing, line items, and payment records.
  - name: Analytics
    description: KPI dashboards, revenue reports, and audit event trail.
  - name: Suppliers
    description: Global supplier management — create and maintain supplier records.
  - name: Supplier Catalogue
    description: >
      Supplier catalogue pricing — link products to supplier prices,
      import CSV/Excel catalogues, and query cross-supplier pricing.
